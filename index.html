<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LibroSphere - Biblioteca Escolar</title>
    <!-- Vinculação do arquivo CSS externo -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>LibroSphere - Biblioteca Escolar</h1>

        <!-- Botões Superiores -->
        <div class="btn-container">
            <button class="btn-add" id="openModalBtn">Adicionar Livro</button>
        </div>

        <!-- Tabela de Livros -->
        <table>
            <thead>
                <tr>
                    <th>Nome do Livro</th>
                    <th>Autor</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="booksTableBody">
                <tr>
                    <td colspan="3" style="color:#64748b; text-align:center;">Conectando ao banco de dados...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Pop-up (Modal) de Cadastro -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>Cadastrar Novo Livro</h2>
            <form id="bookForm">
                <div class="form-group">
                    <label for="bookName">Nome do Livro:</label>
                    <input type="text" id="bookName" required placeholder="Ex: Contabilidade Geral">
                </div>
                <div class="form-group">
                    <label for="bookAuthor">Autor:</label>
                    <input type="text" id="bookAuthor" required placeholder="Ex: António Silva">
                </div>
                <div class="form-group">
                    <label for="driveLink">Link do Google Drive:</label>
                    <input type="url" id="driveLink" required placeholder="https://drive.google.com/...">
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn-cancel" id="closeModalBtn">Cancelar</button>
                    <button type="submit" class="btn-save">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Carregamento das Bibliotecas Oficiais do Firebase via Web (Compatibilidade Máxima) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <!-- Vinculação do arquivo JavaScript externo (Sem type="module" para evitar travas locais) -->
    <script src="JavaScript.js"></script>
</body>
</html>
