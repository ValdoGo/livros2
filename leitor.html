<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leitor de Livro - LibroSphere</title>
    <link rel="stylesheet" href="leitor.style.css">
</head>
<body>

    <!-- Barra Superior de Navegação -->
    <div class="leitor-header">
        <button onclick="window.location.href='index.html'" class="btn-voltar">← Voltar</button>
        <h2 id="titulo-livro">Carregando livro...</h2>
    </div>

    <!-- Container do Leitor Totalmente Limpo -->
    <div class="leitor-container">
        <!-- O iframe agora vai carregar o PDF direto, usando o leitor nativo do celular/navegador -->
        <iframe id="pdf-viewer" src=""></iframe>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const urlDrive = urlParams.get('link');
        const titulo = urlParams.get('titulo');

        if (titulo) {
            document.getElementById('titulo-livro').innerText = decodeURIComponent(titulo);
        }

        if (urlDrive) {
            let fileId = "";

            // Expressão regular para extrair o ID do arquivo do Google Drive de qualquer formato de link
            const matches = urlDrive.match(/(?:\/d\/|id=)([\w-]+)/);
            if (matches && matches[1]) {
                fileId = matches[1];
            }

            if (fileId) {
                // Link profissional de visualização direta (sem ferramentas do Drive)
                // O "#toolbar=0" avisa o navegador para esconder a barra de ferramentas (download/imprimir)
                document.getElementById('pdf-viewer').src = `https://drive.google.com/uc?export=view&id=${fileId}#toolbar=0`;
            } else {
                // Caso o link não seja do drive ou seja inválido, usa o original
                document.getElementById('pdf-viewer').src = urlDrive;
            }
        } else {
            document.getElementById('titulo-livro').innerText = "Erro: Link não encontrado.";
        }
    </script>
</body>
</html>
